<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FaWW Workspace</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <!-- 1. Firebase Auth 라이브러리 추가 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Quill 에디터 (Rich Text) 라이브러리 추가 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-titles">
            <h1>FaWW Workspace</h1>
            <p>칸반 보드, 실시간 문서, 파일 드라이브</p>
        </div>
        <!-- 2. 로그인/로그아웃 버튼 및 사용자 정보 표시 영역 추가 -->
        <div id="auth-section">
            <button id="theme-toggle" onclick="toggleTheme()" class="icon-btn" title="다크 모드 전환">🌙</button>
            <img id="user-avatar" src="" alt="프로필" style="display: none;">
            <span id="user-info"></span>
            <button id="login-btn" onclick="loginWithGoogle()">구글 로그인</button>
            <button id="logout-btn" onclick="logout()" style="display: none;">로그아웃</button>
        </div>
    </div>

    <div class="container">
        <div class="section kanban-section">
            <div class="kanban-header">
                <h2>칸반 보드 (업무 현황)</h2>
                <div class="filter-group">
                    <!-- 보기 모드 전환 버튼 -->
                    <select id="viewMode" onchange="toggleViewMode()" class="search-input" style="background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer;">
                        <option value="status">상태별 보기</option>
                        <option value="timeline">일정별 보기</option>
                        <option value="calendar">캘린더 보기</option>
                    </select>
                    <select id="dateFilter" onchange="filterTasks()" class="search-input">
                        <option value="all">전체 기간</option>
                        <option value="today">오늘까지</option>
                        <option value="week">이번 주까지</option>
                        <option value="month">이번 달까지</option>
                    </select>
                    <input type="text" id="searchAssignee" placeholder="담당자 검색..." oninput="filterTasks()" class="search-input">
                </div>
            </div>
            
            <!-- 전체 진행률 바 영역 -->
            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-title">전체 업무 달성률</span>
                    <span class="progress-text" id="progress-text">0%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
            </div>

            <div class="task-input-area">
                <input type="text" id="taskInput" placeholder="새로운 업무를 입력하세요...">
                <input type="text" id="assigneeInput" placeholder="담당자 (선택)">
                <select id="priorityInput">
                    <option value="low">중요도: 낮음</option>
                    <option value="medium" selected>중요도: 보통</option>
                    <option value="high">중요도: 높음</option>
                </select>
                <button onclick="addTask()">추가</button>
            </div>
            
            <!-- 1. 기존: 상태별 보기 보드 -->
            <div class="kanban-board" id="board-status">
                <div class="column" id="col-todo" ondrop="drop(event, 'todo')" ondragover="allowDrop(event)">
                    <h3>해야 할 일 <span class="task-count" id="count-todo">0</span></h3>
                    <div class="task-list" id="todo-list"></div>
                </div>
                <div class="column" id="col-doing" ondrop="drop(event, 'doing')" ondragover="allowDrop(event)">
                    <h3>진행 중 <span class="task-count" id="count-doing">0</span></h3>
                    <div class="task-list" id="doing-list"></div>
                </div>
                <div class="column" id="col-done" ondrop="drop(event, 'done')" ondragover="allowDrop(event)">
                    <h3>완료 <span class="task-count" id="count-done">0</span></h3>
                    <div class="task-list" id="done-list"></div>
                </div>
            </div>

            <!-- 2. 신규: 일정별 보기 보드 (기본 숨김) -->
            <div class="kanban-board" id="board-timeline" style="display: none;">
                <div class="column" style="border-top: 4px solid var(--danger);">
                    <h3>이번 주 마감 (지연 포함) <span class="task-count" id="count-week">0</span></h3>
                    <div class="task-list" id="week-list"></div>
                </div>
                <div class="column" style="border-top: 4px solid #F59E0B;">
                    <h3>이번 달 마감 <span class="task-count" id="count-month">0</span></h3>
                    <div class="task-list" id="month-list"></div>
                </div>
                <div class="column" style="border-top: 4px solid var(--primary);">
                    <h3>나중 / 미정 <span class="task-count" id="count-later">0</span></h3>
                    <div class="task-list" id="later-list"></div>
                </div>
            </div>

            <!-- 3. 신규: 캘린더 보기 보드 (기본 숨김) -->
            <div id="board-calendar" style="display: none; flex-direction: column; width: 100%;">
                <div class="calendar-controls">
                    <button onclick="changeMonth(-1)">◀ 이전 달</button>
                    <h3 id="calendar-month-year"></h3>
                    <button onclick="changeMonth(1)">다음 달 ▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
        </div>

        <!-- 관리자용 사용자 승인 패널 (기본 숨김) -->
        <div class="section" id="admin-panel" style="display: none;">
            <h2>사용자 관리 (관리자 전용)</h2>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px;">
                    <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem;">대기 중인 사용자</h3>
                    <ul id="user-approval-list" class="user-list"></ul>
                </div>
                <div style="flex: 1; min-width: 300px;">
                    <h3 style="font-size: 1rem; color: var(--primary); margin-bottom: 1rem;">워크스페이스 멤버</h3>
                    <ul id="user-member-list" class="user-list"></ul>
                </div>
            </div>
        </div>

        <div class="bottom-grid">
            <div class="section notes-section">
                <h2>실시간 공유 문서</h2>
                <div id="typing-indicator" class="typing-indicator"></div>
                <!-- 기존 textarea 대신 Quill 에디터 컨테이너 사용 -->
                <div id="editor-container"></div>
            </div>

            <div class="section files-section">
                <h2>공유 드라이브</h2>
                <div class="upload-area">
                    <input type="file" id="fileInput">
                    <button onclick="uploadFile()">업로드</button>
                </div>
                <p id="uploadStatus" class="status-msg"></p>
                <ul id="fileList" class="file-list"></ul>
            </div>
        </div>
    </div>

    <!-- 모달 창 (기본적으로 숨김) -->
    <div id="taskModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">업무 상세</h3>
                <button class="close-btn" onclick="closeModal()" title="닫기">X</button>
            </div>
            <div class="modal-body">
                <div class="modal-date-picker">
                    <label for="modalDueDate">마감일:</label>
                    <input type="date" id="modalDueDate">
                </div>
                <textarea id="modalDescription" placeholder="업무에 대한 상세 설명을 작성하세요..."></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="saveDescription()">저장</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
